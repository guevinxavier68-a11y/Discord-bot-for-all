services:
  - type: worker
    name: discord-bot
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: CLIENT_ID
        sync: false
      - key: OWNER_ID
        sync: false
      - key: GUILD_ID
        sync: false
    autoDeploy: true
